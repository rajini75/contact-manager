<!DOCTYPE html>
<html>
<head>
    <title>Contact Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">📇 Contact Manager</h2>

        <div class="text-end mb-3">
            <a href="/add" class="btn btn-primary">+ Add Contact</a>
        </div>

        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for c in contacts %}
                <tr>
                    <td>{{c[1]}} {{c[2]}}</td>
                    <td>{{c[4]}}</td>
                    <td>{{c[5]}}</td>
                    <td>
                        <a href="/edit/{{c[0]}}" class="btn btn-warning btn-sm">Edit</a>
                        <a href="/delete/{{c[0]}}" class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
